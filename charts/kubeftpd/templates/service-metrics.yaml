---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeftpd.fullname" . }}-metrics
  labels:
    {{- include "kubeftpd.labels" . | nindent 4 }}
spec:
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "kubeftpd.selectorLabels" . | nindent 4 }}
