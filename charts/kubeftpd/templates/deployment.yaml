---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeftpd.fullname" . }}
  labels:
    {{- include "kubeftpd.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "kubeftpd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeftpd.selectorLabels" . | nindent 8 }}
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.commonAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.controller.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.controller.tolerations }}
      tolerations:
        {{- toYaml .Values.controller.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.controller.affinity }}
      affinity:
        {{- toYaml .Values.controller.affinity | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.controller.image.registry }}/{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          command:
            - /manager
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            - name: FTP_PORT
              value: "{{ .Values.ftp.service.port }}"
            - name: FTP_PASSIVE_PORT_MIN
              value: "{{ .Values.ftp.service.passivePortRange.min }}"
            - name: FTP_PASSIVE_PORT_MAX
              value: "{{ .Values.ftp.service.passivePortRange.max }}"
            - name: FTP_WELCOME_MESSAGE
              value: "{{ .Values.ftp.settings.welcomeMessage }}"
            - name: FTP_IDLE_TIMEOUT
              value: "{{ .Values.ftp.settings.idleTimeout }}"
            - name: FTP_MAX_CONNECTIONS
              value: "{{ .Values.ftp.settings.maxConnections }}"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      serviceAccountName: {{ include "kubeftpd.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
